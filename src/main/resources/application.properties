# ===================== Application =====================
spring.application.name=Backend

# ===================== Datasource (PostgreSQL) =====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/campusconnect}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / Hibernate =====================
# Schema is now owned by Flyway migrations (src/main/resources/db/migration).
# "validate" ensures the JPA entity mappings match the migrated schema instead of
# silently auto-altering it, which is what ddl-auto=update was doing before.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===================== Flyway =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================== JWT =====================
# NOTE: override app.jwt.secret via an environment variable in real deployments.
# This default is only for local development.
app.jwt.secret=${JWT_SECRET:c2FtcGxlLWRldi1vbmx5LXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tcGxlYXNlLTEyMzQ1Ng==}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# ===================== OTP / Password reset =====================
app.otp.expiry-minutes=10
app.otp.length=6

# ===================== Mail (Email OTP delivery) =====================
# Fill these in with a real SMTP provider (e.g. Gmail app password, SendGrid, Mailtrap for dev/testing).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@campusconnect.edu}

# ===================== File upload foundation =====================
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================== CORS =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===================== Logging =====================
logging.level.com.example.Backend=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
