# ===================== Application =====================
spring.application.name=Backend

# ===================== Datasource (PostgreSQL) =====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/campusconnect}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / Hibernate =====================
# Schema is now owned by Flyway migrations (src/main/resources/db/migration).
# "validate" ensures the JPA entity mappings match the migrated schema instead of
# silently auto-altering it, which is what ddl-auto=update was doing before.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===================== Flyway =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===================== JWT =====================
# BE-04: previously fell back to a real, working secret committed to source
# control (base64 for "sample-dev-only-secret-key-change-me-in-production-please-123456")
# whenever JWT_SECRET was unset, silently allowing any environment - including a
# misconfigured staging/production deploy - to sign tokens with a secret every
# reader of this repo already has, making forgery of any role's access token
# possible. There is no local/non-local Spring profile in this codebase to key a
# conditional default off, so instead there is now no fallback at all: JWT_SECRET
# must be set explicitly everywhere, including local development. If it's missing,
# Spring fails to start with "Could not resolve placeholder 'JWT_SECRET'" instead
# of quietly issuing forgeable tokens. Generate a local value with e.g.:
#   openssl rand -base64 64
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# ===================== OTP / Password reset =====================
app.otp.expiry-minutes=10
app.otp.length=6

# ===================== Login rate limiting / brute-force protection (BE-05) =====================
# /api/auth/login is intentionally public (permitAll in SecurityConfig) so it
# stays reachable for legitimate users - protection here is enforced in
# AuthServiceImpl/LoginAttemptServiceImpl rather than by locking the endpoint
# down. max-ip-attempts is set higher than max-account-attempts because
# students on the same campus network/NAT can share a public IP.
app.security.login.max-account-attempts=5
app.security.login.max-ip-attempts=30
app.security.login.window-minutes=15
app.security.login.lockout-minutes=15

# ===================== Mail (Email OTP delivery) =====================
# Fill these in with a real SMTP provider (e.g. Gmail app password, SendGrid, Mailtrap for dev/testing).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@campusconnect.edu}

# ===================== File upload foundation =====================
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================== Login brute-force protection (BE-05) =====================
# /api/auth/login is intentionally public (permitAll in SecurityConfig) since
# unauthenticated users must be able to log in - it previously had no
# attempt-rate-limiting, account lockout, or CAPTCHA at all, making it
# vulnerable to credential-stuffing and password-guessing against known
# registration numbers. LoginAttemptService now enforces both a per-IP and
# a per-account threshold within a rolling window, temporarily locking out
# whichever is exceeded (see LoginAttemptServiceImpl for the full rationale,
# including why max-ip-attempts is higher than max-account-attempts - many
# students may share one IP behind campus/dorm NAT).


# ===================== CORS =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===================== Logging =====================
logging.level.com.example.Backend=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n